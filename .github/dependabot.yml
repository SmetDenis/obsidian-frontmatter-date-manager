# Dependabot configuration.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Goal: keep Dependabot focused on runtime (production) dependencies only, and
# stop the noise/failures from dev-only dependencies. The dev toolchain (esbuild,
# wdio/mocha, eslint, etc.) and its transitive packages (e.g. serialize-javascript)
# never ship in the built plugin (esbuild bundles only what src/main.ts imports),
# so a vulnerability there does not reach users. Some of those advisories also have
# no resolvable upgrade path, which makes the Dependabot security-update job fail.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    # Up to 5 open version-update PRs at a time.
    open-pull-requests-limit: 5
    # Both version and security updates apply to production dependencies only;
    # dev dependencies are excluded entirely.
    allow:
      - dependency-type: 'production'
