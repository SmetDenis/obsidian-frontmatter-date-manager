name: Bug report
description: Report incorrect behavior or note-data problems.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security issues use private reporting instead (see the Security link), not this form.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: frontmatter
    attributes:
      label: Minimal frontmatter sample
      description: The smallest property block that triggers the issue.
      render: yaml
    validations:
      required: false
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15 / Windows 11 / Linux / iOS / Android
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I am on the latest plugin version and searched existing issues.
          required: true
