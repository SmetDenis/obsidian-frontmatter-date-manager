name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release and upload assets
  id-token: write # mint the OIDC token Sigstore needs for attestation
  attestations: write # publish the build-provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches manifest.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: make install

      # Full strict gate before publishing: format, lint, typecheck-e2e, test,
      # build - identical to the local pre-commit the release skill runs, so a
      # lint/format/test failure blocks the release instead of shipping. The
      # final `make build` here produces the dist/ bytes attested + uploaded
      # below, with no rebuild in between.
      - run: make pre-commit

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          # Attest the exact dist/ bytes that the next step uploads - no rebuild
          # in between, so the attested digest matches the released asset.
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
